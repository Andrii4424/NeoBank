<header>
    <h1 class="heading">{{"UpdateCredit" |translate}}</h1>
</header>

<section class="object-info-card update-object-info">
    <form [formGroup]="creditForm"
          class="update-entity-form"
          (click)="closeValidationStatus()"
          (ngSubmit)="onSubmit()">

        <div class="update-entity-form-fields">

            <label for="name">{{'TariffName' | translate}}</label>
            <input id="name"
                   type="text"
                   formControlName="name" />

            <label for="interestRate">{{"InterestRateYear" | translate}}</label>
            <input id="interestRate"
                   type="number"
                   step="0.1"
                   min="0"
                   max="100"
                   formControlName="interestRate" />

            <label for="minAmount">{{"MinAmount" | translate}}</label>
            <input id="minAmount"
                   type="number"
                   min="0"
                   formControlName="minAmount" />

            <label for="maxAmount">{{"MaxAmount" | translate}}</label>
            <input id="maxAmount"
                   type="number"
                   min="0"
                   formControlName="maxAmount" />

            <label for="minTermMonths">{{"MinTermMonths" | translate}}</label>
            <input id="minTermMonths"
                   type="number"
                   min="1"
                   formControlName="minTermMonths" />

            <label for="maxTermMonths">{{"MaxTermMonths" | translate}}</label>
            <input id="maxTermMonths"
                   type="number"
                   min="1"
                   formControlName="maxTermMonths" />

            <label>{{"AvailableCurrencies" | translate}}</label>
            <div class="checkboxes">
                <div class="checkbox-items">
                    <input id="uah"
                           type="checkbox"
                           [value]="Currency.UAH"
                           (change)="onCurrencyChange($event)" />
                    <label for="uah">UAH</label>
                </div>

                <div class="checkbox-items">
                    <input id="usd"
                           type="checkbox"
                           [value]="Currency.USD"
                           (change)="onCurrencyChange($event)" />
                    <label for="usd">USD</label>
                </div>

                <div class="checkbox-items">
                    <input id="eur"
                           type="checkbox"
                           [value]="Currency.EUR"
                           (change)="onCurrencyChange($event)" />
                    <label for="eur">EUR</label>
                </div>
            </div>

        </div>

        <div [class.none]="!showValidationResult()" class="validation-result">
            <span [class.none]="!successStatus()" class="success-message">
                {{"TariffSaved" | translate}}
            </span>

            <ul class="errors-list" [class.none]="!showValidationResult()">
                @for (error of validationErrors; track $index) {
                    <li>{{error}}</li>
                }
            </ul>
        </div>

        <button type="submit" class="entity-update">
            {{"SaveTariff" | translate}}
        </button>

    </form>
</section>
